# TTX Round Tracker — GitLab CI
# Push to main: builds and archives artifacts.
# Push a tag (v*): builds, uploads to packages registry, creates a release.
#
# Install from a release:
#   1. Download ttx-round-tracker.zip from the release assets
#   2. Extract into <vault>/.obsidian/plugins/ttx-round-tracker/
#   3. Enable in Obsidian → Settings → Community Plugins

image: node:20-alpine

stages:
  - build
  - release

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    name: "ttx-round-tracker-${CI_COMMIT_SHORT_SHA}"
    paths:
      - main.js
      - manifest.json
      - styles.css
    expire_in: 90 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v/'

release:
  stage: release
  image: alpine:latest
  needs:
    - job: build
      artifacts: true
  before_script:
    - apk add --no-cache curl zip
  script:
    - PLUGIN="ttx-round-tracker"
    - zip "${PLUGIN}.zip" main.js manifest.json styles.css
    # Upload zip to generic packages registry (JOB-TOKEN is sufficient)
    - |
      curl --fail --silent \
           --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "${PLUGIN}.zip" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PLUGIN}/${CI_COMMIT_TAG}/${PLUGIN}.zip"
    # Create GitLab release with download link
    - |
      curl --fail --silent \
           --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --header "Content-Type: application/json" \
           --request POST \
           --data "{
             \"name\": \"TTX Round Tracker ${CI_COMMIT_TAG}\",
             \"tag_name\": \"${CI_COMMIT_TAG}\",
             \"description\": \"## Install\n\n1. Download \`${PLUGIN}.zip\` from the assets below\n2. Extract into \`.obsidian/plugins/${PLUGIN}/\`\n3. Enable in Obsidian → Settings → Community Plugins → TTX Round Tracker\",
             \"assets\": {
               \"links\": [{
                 \"name\": \"${PLUGIN}.zip\",
                 \"url\": \"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PLUGIN}/${CI_COMMIT_TAG}/${PLUGIN}.zip\",
                 \"link_type\": \"package\"
               }]
             }
           }" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
